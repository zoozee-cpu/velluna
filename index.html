<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: "#0A0A0C",
                        brass: "#B38B4F",
                        coolGray: "#1A1A1C",
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0C; color: #E5E5E5; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="p-6 border-b border-coolGray flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-widest text-brass">MZ PORTFOLIO</h1>
        <a href="https://github.com/YOUR_USERNAME" class="hover:text-brass transition-colors">GitHub</a>
    </nav>

    <header class="max-w-4xl mx-auto pt-20 pb-16 px-6 text-center">
        <h2 class="text-5xl font-light mb-6 tracking-wide">Engineering the Future.</h2>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto">
            Showcasing digital creations, web technologies, and modern design patterns.
        </p>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <article class="bg-coolGray rounded-lg overflow-hidden border border-transparent hover:border-brass transition-all duration-300">
                <img src="https://via.placeholder.com/400" alt="Project 1" class="w-full h-64 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-semibold mb-2">Project Alpha</h3>
                    <p class="text-gray-400 text-sm mb-4">An autonomous web solution.</p>
                </div>
            </article>

            <article class="bg-coolGray rounded-lg overflow-hidden border border-transparent hover:border-brass transition-all duration-300">
                 <img src="https://via.placeholder.com/400" alt="Project 2" class="w-full h-64 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-semibold mb-2">Scent & Syntax</h3>
                    <p class="text-gray-400 text-sm mb-4">Exploring digital experiences.</p>
                </div>
            </article>

        </div>
    </main>
</body>
</html>
